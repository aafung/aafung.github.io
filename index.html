<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SENWEB</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root{
    --bg:#0b0e13; --panel:#121722; --panel-2:#0f141d; --line:#1d2533;
    --ring:rgba(255,255,255,.05); --ring-strong:rgba(255,255,255,.11);
    --ink:#e7edf4; --muted:#8a98ab; --faint:#5a6678; --accent:#5eead4; --gray:#6b7686;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); overflow:hidden; -webkit-font-smoothing:antialiased;}
  #stage{position:fixed; inset:0}
  svg{display:block; width:100%; height:100%}

  header{position:fixed; top:0; left:0; right:0; z-index:20; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding:13px 18px; background:linear-gradient(180deg, rgba(8,11,16,.92), rgba(8,11,16,.55) 70%, transparent); pointer-events:none;}
  header > *{pointer-events:auto}
  .brand{display:flex; flex-direction:column; align-items:flex-start; gap:2px; margin-right:6px}
  .brand h1{font-size:16px; font-weight:700; letter-spacing:.30em; text-transform:uppercase; margin:0;}
  .brand .sub{font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.02em}

  .seg{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:3px}
  .seg button{appearance:none; border:0; background:transparent; color:var(--muted); font-family:var(--mono); font-size:11.5px;
    letter-spacing:.06em; text-transform:uppercase; padding:7px 14px; border-radius:999px; cursor:pointer; transition:color .15s;}
  .seg button[aria-pressed="true"]{background:var(--panel-2); color:var(--ink); box-shadow:0 0 0 1px var(--ring-strong) inset}
  .seg button:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  .ctl{display:flex; align-items:center; gap:8px}
  .ctl label{font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.05em; text-transform:uppercase}
  select, input[type=search]{background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; font-family:var(--mono); font-size:12px; padding:7px 10px;}
  input[type=search]{width:190px}
  select:focus-visible, input:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
  .btn{background:var(--panel); color:var(--muted); border:1px solid var(--line); border-radius:8px; font-family:var(--mono); font-size:11px; letter-spacing:.04em; padding:7px 11px; cursor:pointer;}
  .btn:hover{color:var(--ink)}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
  .spacer{flex:1}
  .count{font-family:var(--mono); font-size:11px; color:var(--faint)}

  #legend{position:fixed; left:18px; bottom:18px; z-index:15; background:rgba(15,20,29,.86); border:1px solid var(--line);
    border-radius:12px; padding:12px 14px; max-width:240px; backdrop-filter:blur(6px);}
  #legend h2{font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin:0 0 9px}
  .legrow{display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); padding:2px 0; cursor:default}
  .legrow .sw{width:11px; height:11px; border-radius:3px; flex:none}
  .legrow .ring{width:11px; height:11px; border-radius:50%; border:2px solid; background:transparent; flex:none}

  #detail{position:fixed; right:18px; top:122px; z-index:15; width:300px; background:rgba(15,20,29,.94); border:1px solid var(--line);
    border-radius:14px; padding:16px 17px; transform:translateX(120%); transition:transform .26s cubic-bezier(.2,.7,.2,1); backdrop-filter:blur(7px); max-height:74vh; overflow:auto;}
  #detail.open{transform:none}
  #detail .kind{font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent)}
  #detail .ttl{font-size:15px; line-height:1.35; margin:7px 0 12px; font-weight:600}
  #detail dl{margin:0; display:grid; grid-template-columns:auto 1fr; gap:6px 12px; font-size:12.5px}
  #detail dt{color:var(--faint); font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; text-transform:uppercase; align-self:start; padding-top:2px}
  #detail dd{margin:0; color:var(--ink)}
  .chips{display:flex; flex-wrap:wrap; gap:5px}
  .chip{font-family:var(--mono); font-size:10.5px; background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:3px 7px; color:var(--muted)}
  .evhead{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin:14px 0 7px; border-top:1px solid var(--line); padding-top:11px}
  .ev{font-size:12px; line-height:1.4; padding:6px 0; border-bottom:1px solid rgba(29,37,51,.6)}
  .ev .evt{color:var(--ink)} .ev .evm{font-family:var(--mono); font-size:10.5px; color:var(--faint); margin-top:2px}
  #detail .close{position:absolute; top:11px; right:12px; background:none; border:0; color:var(--faint); font-size:18px; cursor:pointer; line-height:1}
  #detail .close:hover{color:var(--ink)}

  #tip{position:fixed; z-index:30; pointer-events:none; opacity:0; transition:opacity .1s; background:rgba(8,11,16,.96); border:1px solid var(--line);
    border-radius:9px; padding:9px 11px; max-width:300px; font-size:12.5px; line-height:1.4; box-shadow:0 8px 30px rgba(0,0,0,.5);}
  #tip .tt-kind{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:3px}
  #tip .tt-meta{color:var(--muted); font-size:11.5px; margin-top:4px; font-family:var(--mono)}

  .ringlabel{font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; fill:var(--faint)}
  .link{fill:none}
  text.nodelabel{font-family:var(--sans); fill:var(--ink); paint-order:stroke; stroke:var(--bg); stroke-width:3px; stroke-linejoin:round}
  .hint{position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:14; font-family:var(--mono); font-size:11px; color:var(--faint);
    background:rgba(15,20,29,.8); border:1px solid var(--line); padding:7px 13px; border-radius:999px}

  /* ---- chat ---- */
  #chatfab{position:fixed; right:18px; bottom:18px; z-index:18; display:flex; align-items:center; gap:8px;
    background:var(--accent); color:#06231f; border:0; border-radius:999px; font-family:var(--mono); font-size:12px; letter-spacing:.04em;
    font-weight:600; padding:11px 16px; cursor:pointer; box-shadow:0 6px 24px rgba(94,234,212,.25);}
  #chatfab:focus-visible{outline:2px solid #fff; outline-offset:2px}
  #chat{position:fixed; top:0; right:0; bottom:0; width:min(430px,94vw); z-index:26; background:var(--panel-2); border-left:1px solid var(--line);
    transform:translateX(100%); transition:transform .28s cubic-bezier(.2,.7,.2,1); display:flex; flex-direction:column;}
  #chat.open{transform:none}
  .chathead{display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line)}
  .chathead .ct{font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink)}
  .chathead .cs{font-family:var(--mono); font-size:10.5px; color:var(--faint); margin-left:auto}
  .chathead .x{background:none; border:0; color:var(--faint); font-size:20px; cursor:pointer; line-height:1}
  .chathead .x:hover{color:var(--ink)}
  #chatlog{flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:15px}
  .msg{font-size:13.5px; line-height:1.5}
  .msg.user{align-self:flex-end; background:var(--panel); border:1px solid var(--line); border-radius:12px 12px 4px 12px; padding:9px 12px; max-width:86%}
  .msg.bot{align-self:flex-start; max-width:94%; width:94%}
  .msg.bot .ans{background:rgba(94,234,212,.05); border:1px solid rgba(94,234,212,.16); border-radius:12px 12px 12px 4px; padding:11px 13px}
  .msg.note{align-self:center; font-family:var(--mono); font-size:11px; color:var(--faint); text-align:center; max-width:92%}
  .cite{display:inline-block; font-family:var(--mono); font-size:10.5px; color:var(--accent); background:rgba(94,234,212,.1);
    border:1px solid rgba(94,234,212,.28); border-radius:5px; padding:0 5px; margin:0 1px; cursor:pointer}
  .cite:hover{background:rgba(94,234,212,.2)}
  .srcs{margin-top:10px; display:flex; flex-direction:column; gap:6px}
  .src{font-size:11.5px; color:var(--muted); border-left:2px solid var(--line); padding:3px 9px; cursor:pointer}
  .src:hover{border-left-color:var(--accent); color:var(--ink)}
  .src .sm{font-family:var(--mono); font-size:10px; color:var(--faint)}
  .chatfoot{border-top:1px solid var(--line); padding:12px 14px; display:flex; flex-direction:column; gap:10px}
  .modelrow{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .modelrow select{flex:1; min-width:140px}
  #loadllm{background:var(--panel); color:var(--accent); border:1px solid rgba(94,234,212,.3)}
  #loadllm:hover{background:rgba(94,234,212,.08)}
  #loadllm:disabled{color:var(--faint); border-color:var(--line); cursor:default}
  .prog{height:4px; background:var(--panel); border-radius:3px; overflow:hidden; display:none}
  .prog.on{display:block}
  .prog > i{display:block; height:100%; width:0; background:var(--accent); transition:width .2s}
  .inrow{display:flex; gap:8px; align-items:flex-end}
  #chatq{flex:1; resize:none; background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:10px;
    font-family:var(--sans); font-size:13px; padding:10px 12px; max-height:120px; line-height:1.4}
  #chatq:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
  #chatsend{background:var(--accent); color:#06231f; border:0; border-radius:10px; font-weight:600; font-family:var(--mono); font-size:12px; padding:0 16px; height:40px; cursor:pointer}
  #chatsend:disabled{background:var(--panel); color:var(--faint); cursor:default}
  .blink{display:inline-block; width:7px; height:14px; background:var(--accent); margin-left:2px; vertical-align:-2px; animation:bl 1s steps(2) infinite}
  @keyframes bl{50%{opacity:0}}
  @media (prefers-reduced-motion: reduce){ .blink{animation:none} #chat{transition:none} }
  @media (max-width:720px){ #detail{display:none} input[type=search]{width:130px} .brand .sub{display:none} #chat{width:100vw} }

  /* clickable evidence + paper summary */
  .ev.clk{cursor:pointer; border-radius:7px; padding:6px 8px; margin:0 -8px; transition:background .12s}
  .ev.clk:hover{background:rgba(94,234,212,.07)} .ev.clk:hover .evt{color:var(--accent)}
  .summary{margin-top:13px; border-top:1px solid var(--line); padding-top:11px; font-size:12.5px; line-height:1.55; color:var(--muted)}
  .summary b{display:block; color:var(--faint); font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px}
  /* provenance legend swatches */
  .legrow .halosw{width:11px; height:11px; border-radius:50%; background:#39424f; box-shadow:0 0 7px 3px rgba(255,255,255,.55); flex:none}
  .legrow .plainsw{width:11px; height:11px; border-radius:50%; background:transparent; border:1.5px solid #39424f; flex:none}
  /* credits, top-right */
  #credits{position:fixed; top:58px; right:16px; z-index:21; display:flex; align-items:center; justify-content:flex-end; gap:11px; max-width:62vw; pointer-events:none}
  #credits .names{font-size:10.5px; line-height:1.55; color:var(--muted); text-align:right}
  #credits .senlogo{height:50px; flex:none}
  /* splash */
  #splash{position:fixed; inset:0; z-index:2000; background:var(--bg); display:flex; align-items:center; justify-content:center; transition:opacity .75s}
  #splash.done{opacity:0; pointer-events:none}
  .splash-logo-wrap{position:relative; display:flex; flex-direction:column; align-items:center; gap:16px; animation:focusin 1.3s ease-out both}
  #splashlogo{height:104px; filter:drop-shadow(0 0 24px rgba(167,139,250,.42))}
  .splash-title{font-size:30px; font-weight:700; letter-spacing:.42em; padding-left:.42em; color:var(--ink)}
  .flare{position:absolute; inset:-45%; pointer-events:none; mix-blend-mode:screen;
    background:radial-gradient(circle at 50% 42%, rgba(255,255,255,.95), rgba(167,139,250,.55) 17%, rgba(124,58,237,0) 46%); animation:flare 1.5s ease-out forwards}
  @keyframes focusin{0%{filter:blur(22px); opacity:0; transform:scale(1.18)} 45%{opacity:1} 100%{filter:blur(0); opacity:1; transform:scale(1)}}
  @keyframes flare{0%{opacity:0; transform:scale(.4)} 18%{opacity:1; transform:scale(1.05)} 100%{opacity:0; transform:scale(1.6)}}
  /* spider loader */
  .spider-loader{position:absolute; top:0; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center}
  .spider-loader .thread{width:2px; background:#fff; height:60px; animation:drop 1.7s ease-in-out infinite alternate}
  .spider-loader .spider{margin-top:-2px}
  @keyframes drop{from{height:54px} to{height:212px}}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-logo-wrap" id="splashA">
    <div class="flare"></div>
    <img id="splashlogo" src="senweblogo.png" alt="" onerror="this.style.display='none'">
    <div class="splash-title">SENWEB</div>
  </div>
  <div class="spider-loader" id="splashB" hidden>
    <div class="thread"></div>
    <svg class="spider" viewBox="0 0 40 44" width="34" height="38" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g stroke="#7c3aed" stroke-width="1.6" fill="none" stroke-linecap="round">
        <path d="M16 22 L4 14"/><path d="M16 25 L3 24"/><path d="M16 28 L4 34"/><path d="M17 30 L9 40"/>
        <path d="M24 22 L36 14"/><path d="M24 25 L37 24"/><path d="M24 28 L36 34"/><path d="M23 30 L31 40"/>
      </g>
      <ellipse cx="20" cy="27" rx="8" ry="10" fill="#6d28d9"></ellipse>
      <circle cx="20" cy="16" r="5.5" fill="#a78bfa"></circle>
    </svg>
  </div>
</div>
<div id="credits"><div class="names">Anthony A. Fung (PhD), Fu Gao (PhD), Jungmin Nam, Fabio Parisi (PhD),<br>Negin Farzad, Archibald Enninful (PhD),<br>Ruth Montgomery (PhD), Yuval Kluger (PhD), Rong Fan (PhD)</div><img class="senlogo" src="sennetlogo.png" alt="SenNet" onerror="this.style.display='none'"></div>
<header>
  <div class="brand"><h1>SENWEB</h1><span class="sub" id="builtmeta">local explorer</span></div>
  <div class="seg" role="group" aria-label="View mode">
    <button id="mode-docs" aria-pressed="true">Documents</button>
    <button id="mode-tree" aria-pressed="false">Hierarchy</button>
  </div>
  <div class="ctl"><label for="colorby">Color by</label>
    <select id="colorby"><option value="tissue">Tissue</option><option value="cell_type">Cell type</option></select></div>
  <div class="ctl"><input id="search" type="search" placeholder="search title / marker…" aria-label="Search" /></div>
  <button class="btn" id="expand" title="Expand or collapse every branch">Expand all</button>
  <button class="btn" id="reset">Reset view</button>
  <div class="spacer"></div>
</header>

<div id="stage"><svg id="svg">
  <defs>
    <clipPath id="clip-1"><circle r="20"></circle></clipPath>
    <clipPath id="clip-2"><circle r="14"></circle></clipPath>
    <clipPath id="clip-3"><circle r="10"></circle></clipPath>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <radialGradient id="citedHalo">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"></stop>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.26"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
</svg></div>

<aside id="legend"><h2 id="legtitle">Tissue</h2><div id="legbody"></div><div id="status" class="count" style="margin-top:10px"></div></aside>
<aside id="detail" aria-live="polite">
  <button class="close" id="detclose" aria-label="Close">&times;</button>
  <div class="kind" id="detkind"></div><div class="ttl" id="detttl"></div>
  <dl id="detdl"></dl><div id="detev"></div>
</aside>
<div id="tip" role="status"></div>
<div class="hint" id="hint">drag to pan · scroll to zoom · click a node</div>

<button id="chatfab" aria-label="Open assistant">◆ Ask the corpus</button>
<aside id="chat" aria-label="Corpus assistant">
  <div class="chathead">
    <span class="ct">Ask the corpus</span>
    <span class="cs" id="chatstatus">—</span>
    <button class="x" id="chatclose" aria-label="Close">&times;</button>
  </div>
  <div id="chatlog"></div>
  <div class="chatfoot">
    <div class="modelrow">
      <select id="modelsel" aria-label="Model">
        <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3.2 3B · balanced (~2 GB)</option>
        <option value="Llama-3.1-8B-Instruct-q4f16_1-MLC">Llama 3.1 8B · most comprehensive (~5 GB)</option>
        <option value="Phi-3.5-mini-instruct-q4f16_1-MLC">Phi 3.5 mini · strong (~2.2 GB)</option>
        <option value="Qwen2.5-3B-Instruct-q4f16_1-MLC">Qwen 2.5 3B (~2 GB)</option>
        <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B · fastest (~0.9 GB)</option>
      </select>
      <button class="btn" id="loadllm">Enable AI answers</button>
    </div>
    <div class="prog" id="chatprog"><i></i></div>
    <div class="inrow">
      <textarea id="chatq" rows="1" placeholder="Ask anything about the corpus…"></textarea>
      <button id="chatsend">Send</button>
    </div>
  </div>
</aside>

<script>
"use strict";
const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const DUR = REDUCED ? 0 : 520;
const ICON_DIR = "sennet_icons";

const TISSUE_COLORS = {
  "Skin":"#e4a672","Ovary":"#d98ab3","Trachea":"#7fb8d8","Brain":"#9b8ce0","Pancreas":"#e0c36a",
  "Heart":"#e0726f","Placenta":"#cf9ad0","Liver":"#c98a5e","Kidney":"#6fb59a","Lung":"#7cc0c7",
  "Spleen":"#b58fd0","Thymus":"#86c98a","Bone marrow":"#cdb07a","Adipose tissue":"#e6cf83",
  "Skeletal muscle":"#d77f86","Prostate gland":"#8fa9d8","Mesenteric lymph node":"#7fc4ad",
  "Palatine tonsil":"#d590a0","Bladder":"#88bcd0","Colon":"#cf9a6e","Blood":"#d97070"
};
const GRAY="#6b7686";
const catScale=d3.scaleOrdinal(d3.schemeTableau10.concat(d3.schemeSet3||[]));
function colorFor(key){ if(key==null||key==="") return GRAY; return TISSUE_COLORS[key]||catScale(key); }
const NODE_STROKE="#2a3340";
function strokeFor(d){ return NODE_STROKE; }
function strokeWFor(d){ return 1.4; }

const DEMO_DOCS=(()=>{ const tissues=["Skin","Liver","Heart","Brain","Ovary",null];
  const cells=["Fibroblast","Hepatocyte","Cardiomyocyte","Astrocyte","Endothelial cell",null];
  const mk=["CDKN2A (p16)","CDKN1A (p21)","TP53 (p53)","\u03b3H2AX (gH2AX)","LMNB1","IL6","SERPINE1 (PAI-1)","MMP3"];
  const nodes=[],links=[];
  for(let i=0;i<46;i++){ const t=tissues[i%tissues.length];
    nodes.push({id:"d"+String(i).padStart(4,"0"),title:"Sample senescence study "+(i+1)+" in "+(t||"unannotated tissue"),label:"Study "+(i+1),
      tissue:t,cell_type:cells[(i*3)%cells.length],markers:[mk[i%mk.length],mk[(i+3)%mk.length]],year:2019+(i%7),file:"demo_"+i+".pdf",origin:(i%3===0?"cited":"corpus"),summary:"Demo abstract: this placeholder study examines cellular senescence in "+(t||"an unannotated tissue")+", reporting senotypic marker shifts and tissue-level findings used here only to illustrate the SENWEB viewer."});}
  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
    if(nodes[i].tissue&&nodes[i].tissue===nodes[j].tissue&&Math.random()<.4) links.push({source:nodes[i].id,target:nodes[j].id,weight:.6+Math.random()*.35});
    else if(Math.random()<.04) links.push({source:nodes[i].id,target:nodes[j].id,weight:.45+Math.random()*.15});}
  return {meta:{demo:true,n_docs:nodes.length,embedding_model:"(demo)"},nodes,links};
})();
const DEMO_TREE=(()=>{ const feat=["MMP3","IL6","CXCL8","SERPINE1","GDF15"];
  const node=(name,type,count,children,evidence)=>({name,type,count,children,evidence});
  const ev=(o,c,m)=>Array.from({length:3},(_,k)=>({title:`${o} ${c} ${m} evidence study ${k+1}`,year:2020+k,file:`demo_${o}_${k}.pdf`}));
  const organs=["Liver","Skin","Heart","Brain","Ovary"].map((o,oi)=>{
    const cts=["Hepatocyte","Kupffer cell","Endothelial cell","Fibroblast","B cell"].slice(0,3+oi%2).map((c,ci)=>{
      const ms=["CDKN2A (p16)","CDKN1A (p21)","\u03b3H2AX (gH2AX)","TP53 (p53)"].slice(0,2+ci%3).map((m,mi)=>

/* ===== Hierarchy ===== */
const RING_STEP=160, RING_LABELS=["","Organ","Cell type","Marker","Feature"];
let treeRoot=null,gLinks=null,gNodes=null,gRings=null,treeCx=0,treeCy=0,selectedOrgan=null,idc=0;
function baseR(d){ return d.depth===0?16:d.depth===1?22:d.depth===2?16:d.depth===3?12:6; }
function organAncestor(d){ let n=d; while(n&&n.depth>1) n=n.parent; return (n&&n.depth>=1)?n:null; }
function organAncestorColor(d){ const o=organAncestor(d); return o?colorFor(o.data.name):"#9aa6b8"; }
function inSel(node){ return selectedOrgan&&(node===selectedOrgan||node.ancestors().indexOf(selectedOrgan)>=0); }
function buildTree(){
  gRings=gTree.append("g").attr("class","rings"); gLinks=gTree.append("g").attr("fill","none"); gNodes=gTree.append("g");
  treeRoot=d3.hierarchy(TREE); treeRoot.each(d=>{ if(d.depth>=1&&d.children){ d._children=d.children; d.children=null; } });
  const maxDepth=Math.max(treeRoot.height||4,4);
  for(let k=1;k<=maxDepth;k++){
    gRings.append("circle").attr("r",k*RING_STEP).attr("fill","none").attr("stroke",k===1?"var(--ring-strong)":"var(--ring)").attr("stroke-width",1);
    gRings.append("text").attr("class","ringlabel").attr("y",-k*RING_STEP-8).attr("text-anchor","middle").text(RING_LABELS[k]||("L"+k)); }
  updateTree(treeRoot); centerTree();
}
function centerTree(){ treeCx=W/2; treeCy=H/2+6; gTree.attr("transform",`translate(${treeCx},${treeCy})`);
  const fit=Math.min(W,H)/(2*RING_STEP*Math.min(treeRoot.height||4,4)+120); const k=Math.max(.18,Math.min(1,fit));
  svg.transition().duration(REDUCED?0:600).call(zoom.transform,d3.zoomIdentity.translate(W/2-treeCx*k,H/2-treeCy*k).scale(k)); }
function _vleaves(n){ const k=n.children; if(!k||!k.length) return 1; let s=0; for(const c of k) s+=_vleaves(c); return s; }
function assignAngles(node,a0,a1,pinned){
  // proportional fan-out: each child's wedge is sized by its number of visible descendants,
  // so leaf-heavy branches (many markers / genes) spread out and stay legible.
  node.x=(pinned!=null)?pinned:(a0+a1)/2;
  const kids=node.children||[]; if(!kids.length) return;
  const counts=kids.map(_vleaves), tot=counts.reduce((a,b)=>a+b,0)||1;
  let acc=a0;
  for(let i=0;i<kids.length;i++){ const w=(a1-a0)*counts[i]/tot; assignAngles(kids[i],acc,acc+w,null); acc+=w; }
}
function assignRadial(rootNode){
  // organs get arcs proportional to how much is expanded under them; the most-expanded
  // organ is swung to the top (open space) while the collapsed others compress opposite it.
  const organs=rootNode.children||[]; rootNode.x=0; const n=organs.length; if(!n) return;
  const counts=organs.map(_vleaves), total=counts.reduce((a,b)=>a+b,0)||1;
  const ranges=[]; let acc=0;
  for(let i=0;i<n;i++){ const w=counts[i]/total*2*Math.PI; ranges.push([acc,acc+w]); acc+=w; }
  let maxI=0; for(let i=1;i<n;i++) if(counts[i]>counts[maxI]) maxI=i;
  const rot=-((ranges[maxI][0]+ranges[maxI][1])/2);   // center the active organ's wedge at the top
  organs.forEach((org,i)=>{ const a0=ranges[i][0]+rot, a1=ranges[i][1]+rot, gap=Math.min((a1-a0)*0.06,0.05);
    assignAngles(org, a0+gap, a1-gap, (a0+a1)/2); });
}
function updateTree(source){

  lk.exit().transition().duration(DUR).attr("opacity",0).remove();
  lk.enter().append("path").attr("class","link").attr("opacity",0).merge(lk).transition().duration(DUR)
      .attr("stroke",d=>inSel(d.target)?organAncestorColor(d.target):"#5d6f8c").attr("opacity",d=>inSel(d.target)?.95:.6)
      .attr("stroke-width",d=>(inSel(d.target)?0.7:0)+(d.target.depth<=1?1.9:d.target.depth===2?1.3:0.9)).attr("d",linkGen);
  const nd=gNodes.selectAll("g.tn").data(nodes,d=>d.data.__id||(d.data.__id=++idc));
  const ndEnter=nd.enter().append("g").attr("class","tn").attr("transform",d=>radialXY(source.x0!=null?source.x0:d.x,(source.depth||0)*RING_STEP))
    .style("cursor",d=>(d.children||d._children)?"pointer":"default").style("opacity",0);
  ndEnter.append("circle").attr("class","halo").attr("fill","none").attr("stroke-width",3.5).style("opacity",0).attr("pointer-events","none");
  ndEnter.append("circle").attr("class","bg").attr("stroke","#0b0e13").attr("stroke-width",1.4);
  ndEnter.append("text").attr("class","nodelabel").attr("dy","0.32em").style("font-size",d=>d.depth<=1?"12px":d.depth===2?"11px":"10px").style("font-weight",d=>d.depth<=1?600:400);
  ndEnter.filter(d=>d.depth>=1&&d.depth<=3).each(function(d){ const g=d3.select(this);
    resolveIcon(d).then(url=>{ if(!url) return; const ir=d.depth===1?20:d.depth===2?14:10;

        .attr("clip-path",`url(#clip-${d.depth})`).attr("pointer-events","none").style("opacity",0).transition().duration(REDUCED?0:200).style("opacity",1);
      g.select("circle.bg").attr("fill-opacity",.85); }); });
  ndEnter.on("mouseenter",(e,d)=>{ const o=organAncestor(d),ctx=[]; if(d.depth>=1&&o) ctx.push(o.data.name);
      if(d.depth>=3){ let c=d; while(c&&c.depth>2)c=c.parent; if(c&&c.depth===2) ctx.push(c.data.name); }
      const total=(d.data.count!=null)?`<div class="tt-meta">${d.data.count} supporting paper${d.data.count===1?"":"s"}${ctx.length?" · "+esc(ctx.join(" / ")):""}</div>`:"";
      showTip(`<div class="tt-kind">${esc(d.data.type||"node")}</div>${esc(d.data.name)}${total}`,e.clientX,e.clientY); })
    .on("mousemove",(e)=>tip.style("left",(e.clientX+14)+"px").style("top",(e.clientY+14)+"px")).on("mouseleave",hideTip)
    .on("click",(e,d)=>{ if(d.depth===1) selectedOrgan=(selectedOrgan===d?null:d);

  ndAll.select("circle.halo").attr("r",d=>baseR(d)+(d===selectedOrgan?12:8)).attr("stroke",d=>organAncestorColor(d))
    .attr("filter",d=>d===selectedOrgan?"url(#glow)":null).style("opacity",d=>d===selectedOrgan?.95:0);
  ndAll.select("image.nicon").attr("x",d=>-(d.depth===1?20:d.depth===2?14:10)-(d===selectedOrgan?2:0)).attr("y",d=>-(d.depth===1?20:d.depth===2?14:10)-(d===selectedOrgan?2:0))
    .attr("width",d=>2*((d.depth===1?20:d.depth===2?14:10)+(d===selectedOrgan?2:0))).attr("height",d=>2*((d.depth===1?20:d.depth===2?14:10)+(d===selectedOrgan?2:0)));
  ndAll.select("text").attr("transform",d=>{ const ang=d.x-Math.PI/2,flip=(d.x>=Math.PI),off=baseR(d)+(d===selectedOrgan?6:0)+6;
      return `rotate(${ang*180/Math.PI}) translate(${d.depth===0?0:off},0)${flip?" rotate(180)":""}`; })
    .attr("text-anchor",d=>d.depth===0?"middle":((d.x>=Math.PI)?"end":"start"))
    .style("display",d=>(d.depth<=2||d.children||d._children)?null:"none").text(d=>d.depth===0?"":trunc(d.data.name,d.depth<=1?26:18));
  nd.exit().transition().duration(DUR).attr("transform",d=>radialXY(source.x,source.depth*RING_STEP)).style("opacity",0).remove();
  nodes.forEach(d=>d.x0=d.x);
}

d3.select("#expand").on("click",()=>{ allExpanded=!allExpanded;
  treeRoot.each(d=>{ if(d.depth>=1){ if(allExpanded&&d._children){ d.children=d._children; d.children=null; } else if(!allExpanded&&d.children){ d._children=d.children; d.children=null; } } });
  d3.select("#expand").text(allExpanded?"Collapse all":"Expand all"); updateTree(treeRoot); });
d3.select("#search").on("input",function(){ const q=this.value.trim().toLowerCase();
  if(MODE==="docs"&&docNode){ docNode.style("opacity",d=>{ if(!q) return 1; const hay=((d.title||"")+" "+(d.markers||[]).join(" ")+" "+(d.tissue||"")+" "+(d.cell_type||"")).toLowerCase(); return hay.includes(q)?1:.08; }); }
  else if(gNodes){ gNodes.selectAll("g.tn").select("circle.bg").attr("stroke",d=>{ if(q&&d.data.name.toLowerCase().includes(q)) return "#5eead4"; return d._children?organAncestorColor(d):"#0b0e13"; })
      .attr("stroke-width",d=>{ if(q&&d.data.name.toLowerCase().includes(q)) return 3.4; return d._children?2.2:1.4; }); } });

function trunc(s,n){ s=String(s); return s.length>n?s.slice(0,n-1)+"\u2026":s; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function boot(){ docById=new Map(DOCS.nodes.map(n=>[n.id,n])); buildDocs(); buildTree(); setMode("docs"); d3.select("#status").text(`${DOCS.nodes.length} papers · ${DOCS.links.length} links`); window.__senwebReady=true; }
window.SENWEB = { focusDoc, setMode };
(function(){ var sp=document.getElementById('splash'); if(!sp) return;
  var A=document.getElementById('splashA'), B=document.getElementById('splashB'); var START=performance.now();
  setTimeout(function(){ if(A) A.style.display='none'; if(B) B.hidden=false; }, 3000);   // logo for 3s, then spider
  (function fin(){ var t=performance.now()-START;
    if(t>=6000 && window.__senwebReady){ sp.classList.add('done'); setTimeout(function(){ if(sp.parentNode) sp.remove(); }, 770); }
    else setTimeout(fin, 200); })();
  setTimeout(function(){ sp.classList.add('done'); setTimeout(function(){ if(sp.parentNode) sp.remove(); }, 770); }, 20000); // safety
})();
</script>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";
import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3";
env.allowLocalModels = false;

const EMBED_ID = "Xenova/all-MiniLM-L6-v2";          // must match the notebook's RAG_EMBED_MODEL
const HAS_GPU = !!navigator.gpu;
const SYS = "You are SENWEB, a cellular-senescence research assistant. Answer ONLY using the numbered SOURCES the user provides. Cite every factual claim inline with its bracketed id, e.g. [d0007]. If the sources do not contain enough information, reply exactly: \"The corpus doesn't contain enough evidence to answer that.\" Write a clear, synthesized summary that directly answers the question by integrating the sources — do not merely list them. Be concise and precise. Never invent citations or facts.";

let chunks=null, vecs=null, dim=0, embedder=null, engine=null, llmReady=false, indexOK=false, busy=false;
const $=id=>document.getElementById(id);
const log=$("chatlog");
function setStatus(t){ $("chatstatus").textContent=t; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function mdLite(s){ s=esc(s); s=s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>"); s=s.replace(/\n/g,"<br>");
  return s.replace(/\[(d\d{3,6})\]/g,(m,id)=>`<span class="cite" data-id="${id}">${id}</span>`); }
function addNote(t){ const d=document.createElement("div"); d.className="msg note"; d.textContent=t; log.appendChild(d); log.scrollTop=log.scrollHeight; }
function addUser(t){ const d=document.createElement("div"); d.className="msg user"; d.textContent=t; log.appendChild(d); log.scrollTop=log.scrollHeight; }
function addBot(){ const d=document.createElement("div"); d.className="msg bot";
  d.innerHTML=`<div class="ans"></div><div class="srcs"></div>`; log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }

async function loadIndex(){
  try{
    const [cj,vb]=await Promise.all([
      fetch("rag_chunks.json").then(r=>{if(!r.ok)throw 0; return r.json();}),
      fetch("rag_vectors.bin").then(r=>{if(!r.ok)throw 0; return r.arrayBuffer();})]);
    chunks=cj.chunks; dim=cj.dim; vecs=new Float32Array(vb); indexOK=true;
    setStatus(`${chunks.length} passages`);
    addNote(`Indexed ${chunks.length} passages. Answers are grounded in the corpus and cite paper ids — click a citation to find it in the graph.`);
    if(!HAS_GPU) addNote("This browser has no WebGPU, so retrieval works but synthesized AI answers are unavailable. Chrome or Edge enables them.");
  }catch(e){ setStatus("no index"); addNote("RAG index not found. Run the notebook's RAG cell to generate rag_chunks.json + rag_vectors.bin, then reload."); }
}
async function ensureEmbedder(){ if(embedder) return; setStatus("loading retriever…");
  embedder=await pipeline("feature-extraction",EMBED_ID,{device:HAS_GPU?"webgpu":"wasm"}); setStatus(`${chunks.length} passages`); }
async function embed(text){ const out=await embedder([text],{pooling:"mean",normalize:true}); return out.tolist()[0]; }
function topK(q,k){ const n=chunks.length, scores=new Float64Array(n);
  for(let i=0;i<n;i++){ let s=0; const off=i*dim; for(let d=0;d<dim;d++) s+=q[d]*vecs[off+d]; scores[i]=s; }
  return Array.from({length:n},(_,i)=>i).sort((a,b)=>scores[b]-scores[a]).slice(0,k).map(i=>Object.assign({score:scores[i]},chunks[i])); }
function renderSources(host,top){ host.innerHTML="";
  const seen=new Set();
  top.forEach(t=>{ if(seen.has(t.paper_id)) return; seen.add(t.paper_id);
    const d=document.createElement("div"); d.className="src"; d.dataset.id=t.paper_id;
    d.innerHTML=`${esc(t.title||t.file)} <span class="sm">[${t.paper_id}] · ${(t.score*100).toFixed(0)}%</span>`; host.appendChild(d); }); }

async function ensureLLM(){ const id=$("modelsel").value; const prog=$("chatprog"); prog.classList.add("on");
  setStatus("loading model…"); $("loadllm").disabled=true;
  try{
    engine=await webllm.CreateMLCEngine(id,{ initProgressCallback:p=>{ prog.querySelector("i").style.width=Math.round((p.progress||0)*100)+"%"; setStatus(p.text? p.text.slice(0,38):"loading…"); }});
    llmReady=true; setStatus("model ready"); $("loadllm").textContent="AI answers on"; addNote(`Model ready: ${id}. New questions will be answered in prose with citations.`);
  }catch(e){ setStatus("model failed"); $("loadllm").disabled=false; addNote("Could not load that model (needs WebGPU + memory). Try the 1B option, or a Chromium browser."); }
  finally{ prog.classList.remove("on"); }
}

async function ask(q){
  if(!indexOK){ addNote("No index loaded."); return; }
  if(busy) return; busy=true; $("chatsend").disabled=true;
  addUser(q); const bot=addBot(); const ans=bot.querySelector(".ans"), srcs=bot.querySelector(".srcs");
  ans.innerHTML='<span class="blink"></span>';
  try{
    await ensureEmbedder();
    const qv=await embed(q); const top=topK(qv,6); renderSources(srcs,top);
    if(llmReady && top.length){
      const ctx=top.map(t=>`[${t.paper_id}] ${t.title}\n${t.text}`).join("\n\n");
      const stream=await engine.chat.completions.create({ temperature:0.2, stream:true,
        messages:[{role:"system",content:SYS},{role:"user",content:`SOURCES:\n\n${ctx}\n\nQUESTION: ${q}`}] });
      let acc="";
      for await(const ch of stream){ acc+=ch.choices?.[0]?.delta?.content||""; ans.innerHTML=mdLite(acc)+'<span class="blink"></span>'; log.scrollTop=log.scrollHeight; }
      ans.innerHTML=mdLite(acc);
    } else if(top.length){
      ans.innerHTML=mdLite("Showing the most relevant passages from the corpus. Enable AI answers above for a synthesized response.\n\n"+
        top.slice(0,3).map(t=>`**[${t.paper_id}]** ${t.text.slice(0,240)}…`).join("\n\n"));
    } else { ans.textContent="No relevant passages found in the corpus."; }
  }catch(e){ ans.textContent="Something went wrong: "+(e?.message||e); }
  finally{ busy=false; $("chatsend").disabled=false; }
}

// citation / source click -> focus the node in the graph
log.addEventListener("click",e=>{ const el=e.target.closest(".cite,.src"); if(!el) return;
  const id=el.dataset.id; if(id && window.SENWEB) window.SENWEB.focusDoc(id); });

// open / close
let opened=false;
function openChat(){ $("chat").classList.add("open"); $("chatfab").style.display="none"; if(!opened){ opened=true; loadIndex(); } $("chatq").focus(); }
function closeChat(){ $("chat").classList.remove("open"); $("chatfab").style.display=""; }
$("chatfab").addEventListener("click",openChat);
$("chatclose").addEventListener("click",closeChat);
$("loadllm").addEventListener("click",ensureLLM);
if(!HAS_GPU){ $("loadllm").disabled=true; $("loadllm").textContent="AI answers need WebGPU"; }

const qbox=$("chatq");
qbox.addEventListener("input",()=>{ qbox.style.height="auto"; qbox.style.height=Math.min(qbox.scrollHeight,120)+"px"; });
function send(){ const v=qbox.value.trim(); if(!v) return; qbox.value=""; qbox.style.height="auto"; ask(v); }
$("chatsend").addEventListener("click",send);
qbox.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } });
</script>
</body>
